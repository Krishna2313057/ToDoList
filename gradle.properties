# JVM arguments for Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable AndroidX
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Use non-transitive R class for smaller builds
android.nonTransitiveRClass=true

# Set Java 17 JDK path ? make sure this path exists and points to a valid JDK 17
org.gradle.java.home=C:\\Program Files\\Java\\jdk-17.0.0.1
